<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FMC BOILER MOBILE V9</title>

<meta
name="theme-color"
content="#0B8F43">

<meta
name="apple-mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-status-bar-style"
content="default">

<meta
name="apple-mobile-web-app-title"
content="FMC">

<link rel="manifest" href="manifest.json">

<link rel="icon" href="icons/icon-192.png">

<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="stylesheet" href="css/index.css">

</head>

<body>

<!-- ======================================
SPLASH SCREEN
====================================== -->

<div id="splash">

<img
src="icons/logo.png"
class="splash-logo">

<h1>FMC BOILER</h1>

<p>
Farm Management Control System
</p>

<div class="loadingBox">

<div class="loadingBar"></div>

</div>

<span class="loadingText">

Loading Data...

</span>

</div>

<!-- ======================================
HEADER
====================================== -->

<header class="header">

<div class="headerTop">

<div>

<h2 id="farmNama">

FMC BOILER

</h2>

<div id="updateTime">

Loading...

</div>

</div>

<div id="statusServer">

🟢 Online
</div>

<button
    id="installBtn"
    onclick="installApp()"
    style="display:none;">
    📲 Install App
</button>

</div>

</header>

<!-- ======================================
CONTENT
====================================== -->

<main id="app">
  
<!-- ======================================
DASHBOARD
====================================== -->

<section id="dashboardPage">

<div class="card">

<h2>Memuat Dashboard...</h2>

</div>

</section>

<!-- ======================================
FLOK
====================================== -->

<section
id="flokPage"
style="display:none;">

<div class="card">

<h2>Memuat Data Flok...</h2>

</div>

</section>

<!-- ======================================
HARIAN
====================================== -->

<section
id="harianPage"
style="display:none;">

<div class="card">

<h2>Memuat Data Harian...</h2>

</div>

</section>

<!-- ======================================
KEUANGAN
====================================== -->

<section
id="keuanganPage"
style="display:none;">

<div class="card">

<h2>Memuat Data Keuangan...</h2>

</div>

</section>

<!-- ======================================
AI
====================================== -->

<section
id="aiPage"
style="display:none;">

<div class="card">

<h2>🤖 FMC AI</h2>

<p>Menyiapkan analisis...</p>

</div>

</section>

</main>

<!-- ======================================
BOTTOM NAVIGATION
====================================== -->

<nav class="bottomNav">

<button id="btnDashboard"
onclick="showPage('dashboard')"
class="active">

🏠
<span>Home</span>

</button>

<button id="btnFlok"
onclick="showPage('flok')">

🐔
<span>Flok</span>

</button>

<button id="btnHarian"
onclick="showPage('harian')">

📅
<span>Harian</span>

</button>

<button id="btnKeuangan"
onclick="showPage('keuangan')">

💰
<span>Keuangan</span>

</button>

<button id="btnAI"
onclick="showPage('ai')">

🤖
<span>AI</span>

</button>

</nav>

<!-- ======================================
JAVASCRIPT
====================================== -->

<script src="js/api.js"></script>

<script src="js/dashboard.js"></script>

<script src="js/flok.js"></script>

<script src="js/harian.js"></script>

<script src="js/keuangan.js"></script>

<script src="js/ai.js"></script>

<script src="js/app.js"></script>

<script>

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker
.register("./service-worker.js")
.then(()=>{

console.log("Service Worker Aktif");

})
.catch(err=>{

console.log(err);

});

});

}

</script>

</body>

</html>
